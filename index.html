<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Room Chat</title>

<link rel="stylesheet" href="style.css">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getDatabase,
ref,
push,
onChildAdded,
set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "YOUR_DATABASE_URL",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXXXXXX",
  appId: "XXXXXXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.createRoom = () => {
    const roomId = Math.random().toString(36).substring(2,8).toUpperCase();

    set(ref(db,"rooms/"+roomId),{
        created: Date.now()
    });

    document.getElementById("roomId").value = roomId;
    joinRoom(roomId);
};

window.joinRoomBtn = () => {
    const roomId = document.getElementById("roomId").value.trim();
    if(roomId) joinRoom(roomId);
};

function joinRoom(roomId){

    window.currentRoom = roomId;

    document.querySelector(".home").style.display="none";
    document.querySelector(".chat").style.display="flex";

    document.getElementById("showRoom").innerText =
    "Room: "+roomId;

    const chatRef = ref(db,"messages/"+roomId);

    onChildAdded(chatRef,(snapshot)=>{
        const msg = snapshot.val();

        const div = document.createElement("div");
        div.className = "message";
        div.innerHTML =
        `<b>${msg.sender}</b><br>${msg.text}`;

        document.getElementById("messages")
        .appendChild(div);

        document.getElementById("messages")
        .scrollTop =
        document.getElementById("messages").scrollHeight;
    });
}

window.sendMessage = () => {

    const text =
    document.getElementById("messageInput").value;

    if(!text.trim()) return;

    push(
      ref(db,"messages/"+window.currentRoom),
      {
        sender:"User",
        text:text,
        time:Date.now()
      }
    );

    document.getElementById("messageInput").value="";
};
</script>

</head>
<body>

<div class="container">

<div class="home">

<h1>Quick Room Chat</h1>

<button onclick="createRoom()">
Create Room
</button>

<input
id="roomId"
placeholder="Enter Room ID">

<button onclick="joinRoomBtn()">
Join Room
</button>

</div>

<div class="chat">

<div class="topbar">
<span id="showRoom"></span>
</div>

<div id="messages"></div>

<div class="sendBox">
<input
id="messageInput"
placeholder="Type message...">

<button onclick="sendMessage()">
Send
</button>
</div>

</div>

</div>

</body>
</html>
